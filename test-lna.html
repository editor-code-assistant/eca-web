<!DOCTYPE html>
<html>
<head>
  <title>LNA / Mixed Content Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h2 { color: #569cd6; margin-top: 24px; }
    .test { margin: 6px 0; padding: 8px; border-radius: 4px; }
    .pass { background: #1e3a1e; color: #4ec94e; }
    .fail { background: #3a1e1e; color: #e94e4e; }
    .wait { background: #3a3a1e; color: #e9e94e; }
    input, button, select { font-family: monospace; font-size: 14px; padding: 6px 12px; }
    button { cursor: pointer; background: #569cd6; color: #1e1e1e; border: none; border-radius: 4px; margin: 4px; }
    #results { margin-top: 20px; }
    .info { color: #888; font-size: 12px; }
    .section { margin-top: 16px; padding-top: 8px; border-top: 1px solid #444; }
  </style>
</head>
<body>
  <h2>Chrome LNA / Mixed Content Integration Test</h2>
  <p class="info">
    Page protocol: <strong id="pageProto"></strong> |
    Chrome: <strong id="chromeVer"></strong> |
    Secure context: <strong id="secureCtx"></strong>
  </p>

  <div>
    <label>Host: <input id="host" value="192.168.15.17" size="20"></label>
    <label>Port: <input id="port" value="7780" size="6"></label>
    <label>Path: <input id="path" value="/api/v1/health" size="25"></label>
  </div>
  <div style="margin-top: 8px;">
    <button onclick="runAll()">▶ Run All Tests</button>
    <button onclick="results.innerHTML=''">Clear</button>
  </div>

  <div id="results"></div>

  <script>
    document.getElementById('pageProto').textContent = location.protocol;
    const m = navigator.userAgent.match(/Chrome\/(\d+)/);
    document.getElementById('chromeVer').textContent = m ? m[1] : 'N/A';
    document.getElementById('secureCtx').textContent = String(window.isSecureContext);

    const results = document.getElementById('results');

    function getUrl(proto) {
      const h = document.getElementById('host').value;
      const p = document.getElementById('port').value;
      const path = document.getElementById('path').value;
      return `${proto}://${h}:${p}${path}`;
    }

    function addSection(title) {
      const div = document.createElement('div');
      div.className = 'section';
      div.innerHTML = `<strong style="color:#569cd6">${title}</strong>`;
      results.appendChild(div);
    }

    function addTest(id, label) {
      const div = document.createElement('div');
      div.id = id;
      div.dataset.label = label;
      div.className = 'test wait';
      div.textContent = `⏳ ${label}`;
      results.appendChild(div);
    }

    function log(id, ok, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'test ' + (ok ? 'pass' : 'fail');
      el.textContent = `${ok ? '✅' : '❌'} ${el.dataset.label}: ${msg}`;
    }

    async function test(id, label, url, init, timeoutMs = 8000) {
      addTest(id, label);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      const optsStr = init ? JSON.stringify(init) : '{}';
      try {
        const t0 = performance.now();
        const res = await fetch(url, { ...init, signal: ctrl.signal });
        const ms = Math.round(performance.now() - t0);
        clearTimeout(timer);
        if (res.type === 'opaque') {
          log(id, true, `opaque (no-cors OK) ${ms}ms — ${optsStr}`);
        } else {
          const txt = await res.text().catch(() => '');
          log(id, true, `${res.status} ${ms}ms — body: ${txt.slice(0,80)} — ${optsStr}`);
        }
      } catch (err) {
        clearTimeout(timer);
        const kind = err.name === 'AbortError' ? 'TIMEOUT' : err.name;
        log(id, false, `${kind}: ${err.message} — ${optsStr}`);
      }
    }

    async function runAll() {
      results.innerHTML = '';
      const httpUrl = getUrl('http');
      const httpsUrl = getUrl('https');

      // --- Section 1: HTTP target ---
      addSection(`HTTP target: ${httpUrl}`);
      await test('h1', 'Plain fetch', httpUrl);
      await test('h2', 'mode: no-cors', httpUrl, { mode: 'no-cors' });
      await test('h3', 'targetAddressSpace: private', httpUrl, { targetAddressSpace: 'private' });
      await test('h4', 'targetAddressSpace: local', httpUrl, { targetAddressSpace: 'local' });
      await test('h5', 'no-cors + targetAddressSpace: private', httpUrl, { mode: 'no-cors', targetAddressSpace: 'private' });

      // --- Section 2: HTTPS target ---
      addSection(`HTTPS target: ${httpsUrl}`);
      await test('s1', 'Plain fetch', httpsUrl);
      await test('s2', 'mode: no-cors', httpsUrl, { mode: 'no-cors' });
      await test('s3', 'targetAddressSpace: private', httpsUrl, { targetAddressSpace: 'private' });

      // --- Summary ---
      addSection('Done — also check DevTools Console tab for mixed content / CORS warnings');
    }
  </script>
</body>
</html>
